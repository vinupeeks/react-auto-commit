name: Auto Commit
on:
  schedule:
    - cron: "30 11 * * *"   # 17:00 IST
  workflow_dispatch:
jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Make 10 commits
        run: |
          for i in {1..5}
          do
            node scripts/update.js
            git add .
            git commit -m "Auto commit $i"
          done

      - name: Commit Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Auto update $(date)" || echo "No changes"
          git push